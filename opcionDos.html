<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Herramientas de Luis Páez</title>

<style>
:root {
    --primary:#007bff;
    --bg:#f4f7f6;
    --card:#ffffff;
    --text:#333;
    --muted:#777;
    --border:#eaeaea;
}

body.dark {
    --primary:#4da3ff;
    --bg:#0f0f0f;
    --card:#1c1c1c;
    --text:#eee;
    --muted:#aaa;
    --border:#333;
}

*{box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto}

body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    padding:30px 15px;
    transition:.4s ease;
}

.container{max-width:900px;width:100%}

/* HEADER */
.header{text-align:center;margin-bottom:25px}
.header h1{font-size:30px;margin:0;font-weight:700}
.subtitle{opacity:.7;font-size:13px}

.theme-toggle{
    margin-top:10px;
    border-radius:20px;
    padding:6px 12px;
    border:1px solid var(--border);
    background:var(--card);
    cursor:pointer;
}

/* SEARCH */
.search{
    margin:20px 0;
    position:relative;
}

.search input{
    width:100%;
    padding:14px 40px;
    border-radius:30px;
    border:1px solid var(--border);
    background:var(--card);
    font-size:15px;
}

.search span{
    position:absolute;
    left:12px;
    top:50%;
    transform:translateY(-50%);
    opacity:.5;
}

/* FILTERS */
.filters{display:flex;gap:10px;overflow:auto;margin-bottom:20px}
.filters button{
    padding:8px 16px;
    border-radius:20px;
    border:1px solid var(--border);
    background:transparent;
    cursor:pointer;
}
.filters button.active{
    background:var(--primary);
    color:white;
    border-color:var(--primary);
}

/* GRID */
.grid{display:grid;gap:18px}
@media(min-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}

/* CARD */
.card{
    position:relative;
    padding:18px;
    border-radius:16px;
    background:var(--card);
    border:1px solid var(--border);
    text-decoration:none;
    color:inherit;
    overflow:hidden;
    transform:translateY(20px);
    opacity:0;
    animation:fadeUp .6s forwards;
}

.card:hover{
    transform:translateY(-6px) scale(1.02);
    box-shadow:0 10px 30px rgba(0,0,0,.15);
}

.card::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(120deg,transparent,rgba(255,255,255,.15),transparent);
    opacity:0;
    transition:.5s;
}
.card:hover::before{opacity:1;animation:shine 1s}

.card h3{margin:0;color:var(--primary)}
.card p{font-size:14px;color:var(--muted)}

.tag{
    margin-top:10px;
    font-size:11px;
    padding:4px 8px;
    border-radius:10px;
    background:var(--border);
    display:inline-block;
}

.card::after{
    content:"→";
    position:absolute;
    right:15px;
    bottom:15px;
    opacity:.5;
}

.no-results{text-align:center;margin-top:30px;opacity:.6}

/* ANIMATIONS */
@keyframes fadeUp{
    to{opacity:1;transform:translateY(0)}
}

@keyframes shine{
    from{transform:translateX(-100%)}
    to{transform:translateX(100%)}
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>Herramientas que he creado</h1>
<div class="subtitle">Luis Páez</div>
<button class="theme-toggle" id="themeBtn">🌙 Tema</button>
</div>

<div class="search">
<span>🔍</span>
<input id="search" placeholder="Busca una herramienta...">
</div>

<div class="filters" id="filters"></div>

<div class="grid" id="grid"></div>

</div>

<script>
const data=[
{n:"Mi IP Pública",d:"Ver tu IP.",u:"https://ippublica.streamlit.app/",c:"utilidades"},
{n:"Quita Fondo",d:"Eliminar fondo.",u:"https://quitafondo-luispaez.streamlit.app/",c:"imagenes"},
{n:"Diccionario Odami",d:"Lengua Odami.",u:"https://diccionarioodamiespanolbyluispaez.streamlit.app/",c:"humanos"},
{n:"PDF Tools",d:"Trabajar PDF.",u:"https://trabajoconpdf-luispaez.streamlit.app/",c:"pdf"}
];

const cats=["todos",...new Set(data.map(x=>x.c))];
let current="todos";

const grid=document.getElementById("grid");
const filters=document.getElementById("filters");
const search=document.getElementById("search");

// filtros
cats.forEach(c=>{
 const b=document.createElement("button");
 b.textContent=c;
 if(c==="todos")b.classList.add("active");
 b.onclick=()=>{
  document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("active"));
  b.classList.add("active");
  current=c;
  render();
 };
 filters.appendChild(b);
});

function render(){
 grid.innerHTML="";
 const txt=search.value.toLowerCase();
 const filtered=data.filter(x=>
  (current==="todos"||x.c===current)&&
  (x.n.toLowerCase().includes(txt)||x.d.toLowerCase().includes(txt))
 );

 if(!filtered.length){
  grid.innerHTML='<div class="no-results">😕 Sin resultados</div>';
  return;
 }

 filtered.forEach((p,i)=>{
  const a=document.createElement("a");
  a.href=p.u;
  a.target="_blank";
  a.className="card";
  a.style.animationDelay=i*0.05+"s";

  a.innerHTML=`
  <h3>${p.n}</h3>
  <p>${p.d}</p>
  <span class="tag">${p.c}</span>`;

  grid.appendChild(a);
 });
}

search.oninput=render;
render();

// tema
const btn=document.getElementById("themeBtn");
if(localStorage.t==="d")document.body.classList.add("dark");
btn.onclick=()=>{
 document.body.classList.toggle("dark");
 localStorage.t=document.body.classList.contains("dark")?"d":"l";
};

</script>

</body>
</html>
